[pytest]
; Tell pytest where to find tests
testpaths = tests

; Register custom markers so pytest doesn't warn about unknown ones.
; @pytest.mark.perf  → performance/load tests (slow, run separately)
; @pytest.mark.integration → tests that need a real DB or LocalStack
markers =
    perf: performance and load tests (run with -m perf)
    integration: integration tests requiring external services

; Show short test summary for failures
addopts = -v --tb=short
