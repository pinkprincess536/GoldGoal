events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream api {
        server api:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # FastAPI — all API routes and health check
        location /health {
            proxy_pass http://api;
        }

        location /auth {
            proxy_pass http://api;
        }

        location /portfolio {
            proxy_pass http://api;
        }

        location /goals {
            proxy_pass http://api;
        }

        location /prices {
            proxy_pass http://api;
        }

        location /alerts {
            proxy_pass http://api;
        }

        location /metrics {
            proxy_pass http://api;
        }

        # Streamlit dashboard
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
